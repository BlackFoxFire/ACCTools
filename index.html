<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACC Tools</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <!-- Icones Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- CSS -->
  <link rel="stylesheet" href="./css/style.css" />
  <!-- Javascript -->
  <script src="./javascript/java.js" defer></script>
</head>

<body>

  <main>
    <section class="p-2">
      <div class="container">
        <div class="row">
          <div class="col-12 col-md-6 m-auto bg-light bg-opacity-50 p-1">
            <div class="text-center">
              <img src="./pictures/acc.png" alt="Logo Assetto Corsa Competizione" class="img-fluid w-50">
            </div>
            <form action="./" method="post" id="myForm" class="bg-dark bg-opacity-50 text-light fs-5 rounded-3 p-3">
              <!-- Type de course -->
              <div class="row mt-2">
                <div class="col-12 d-flex justify-content-between">
                    <label for="raceType">Type de course:</label>
                    <span id="raceTypeValue">Sprint Race</span>
                </div>
              </div>
              <div class="row mt-1">
                <div class="col-12">
                    <input type="range" name="raceType" id="raceType" min="1" max="5" value="1" title="Type de course" class="w-100">
                </div>
              </div>
              <!-- Durée de la course -->
              <div class="row mt-2">
                <div class="col-12 d-flex justify-content-between">
                    <label for="raceTime">Durée de la course:</label>
                    <span id="raceTimeValue"></span>
                </div>
              </div>
              <div class="row mt-1">
                <div class="col-12">
                    <input type="range" name="raceTime" id="raceTime" min="0" title="Durées de la course" class="w-100">
                </div>
              </div>
              <!-- Temps moyen au tour -->
              <div class="row mt-2">
                <div class="col-12 d-flex justify-content-between">
                    <label for="lapTime">Temps moyen au tour:</label>
                    <span id="lapTimeValue"></span>
                </div>
              </div>
              <div class="row mt-1">
                <div class="col-12">
                    <input type="range" name="lapTime" id="lapTime" min="60" max="600" value="120" title="Temps d'un tour de piste en secondes" class="w-100">
                </div>
              </div>
              <!-- Consommation moyenne par tour de piste -->
              <div class="row mt-2">
                <div class="col-12 d-flex justify-content-between">
                    <label for="consumption">Consommation par tour: </label>
                    <span id="consumptionValue"></span>
                </div>
              </div>
              <div class="row mt-1">
                <div class="col-12">
                    <input type="range" name="consumption" id="consumption" min="1" max="15" step="0.1" value="3" title="Consommation de carburant au tour" class="w-100">
                </div>
              </div>
              <!-- Types d'arrêt au stand -->
              <div id="typePitStopDiv">
                <div class="row mt-2">
                  <div class="col-12 d-flex justify-content-between">
                      <span>Type d'arrêt aux stands: </span>
                      <span id="typePitStopValue"></span>
                  </div>
                </div>
                <div class="row mt-1">
                  <div class="col-12">
                      <input type="range" name="typePitStop" id="typePitStop" min="1" value="1" title="Type d'arrêt aux stands" class="w-100">
                  </div>
                </div>
              </div>
              <!-- Relay de course -->
              <div class="row mt-2" id ="relayDiv">
                <div class="col-12 d-flex justify-content-between">
                    <span id="relayLabel">Arrêt aux stands: </span>
                    <span id="relayValue"></span>
                </div>
              </div>
              <!-- Nombre d'arret au stand -->
              <div class="row mt-1" id="standDiv">
                <div class="col-12">
                    <input type="range" name="stand" id="stand" min="0" value="0" title="Nombre d'arrêts au stand avec ravitaillement" class="w-100">
                </div>
              </div>
              <!-- Temps de relay d'un pilote -->
              <div class="row mt-1" id="pilotRelayTimeDiv">
                <div class="col-12">
                    <input type="range" name="pilotRelayTime" id="pilotRelayTime" min="0" value="0" title="Temps de relay du pilote" class="w-100">
                </div>
              </div>
              <!-- Y-a-t'il un tour de formation ? -->
              <div class="row mt-2">
                <div class="col-12 d-flex justify-content-between">
                    <label for="stand">Tour de formation: </label>
                    <input type="checkbox" name="formationLap" id="formationLap" title="Y-a-t'il un tour de formation ?">
                </div>
              </div>
              <!-- Comsommation estimée pour un relais -->
              <div class="row mt-2" id="relayFuelDiv">
                <div class="col-12 col-md-8">
                    <span>Carburant par relais:</span>
                </div>
                <div class="col-12 col-md-4">
                    <div id="relayFuel" class="bg-warning p-1 rounded-3 text-center lh-1 bg-opacity-50"></div>
                </div>
              </div>
              <!-- Comsommation total estimée pour la course -->
              <div class="row mt-2">
                <div class="col-12 col-md-8">
                    <span>Carburant total:</span>
                </div>
                <div class="col-12 col-md-4">
                    <div id="fuel" class="bg-warning p-1 rounded-3 text-center lh-1 bg-opacity-50"></div>
                </div>
              </div>
              <!-- Informations divers sur la course -->
              <div class="row mt-3 bg-primary bg-opacity-50 rounded-3 fs-6">
                <!-- Nombre total de tour -->
                <div class="col-12 col-md-6 text-center">
                    <span>Nombre de tours:</span>
                    <span id="totalLaps"></span>
                </div>
                <!-- Nombre total d'arret au stand -->
                <div class="col-12 col-md-6 text-center">
                  <span>Nombre d'arret au stand:</span>
                  <span id="pitStopValue"></span>
                </div>
                <!-- Litres utilisés par minutes -->
                <div class="col-12 col-md-6 text-center">
                  <span>Litre par minutes:</span>
                  <span id="fuelPerMinutes"></span>
                </div>
                <div class="col-12 col-md-6 text-center">
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>
  
  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
  crossorigin="anonymous">
  </script>

</body>

</html>
